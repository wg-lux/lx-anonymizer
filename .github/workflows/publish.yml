name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to write to pyproject.toml and package.nix"
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare-release:
    name: Bump versions and tag release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate requested version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          version = os.environ["RELEASE_VERSION"].strip()
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:[-._]?[0-9A-Za-z]+)*", version):
              print(f"Invalid release version: {version}", file=sys.stderr)
              sys.exit(1)
          print(f"Validated release version: {version}")
          PY

      - name: Ensure release tag does not already exist
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${RELEASE_VERSION} already exists" >&2
            exit 1
          fi

      - name: Bump version in release files
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["RELEASE_VERSION"]
          updates = {
              "pyproject.toml": (
                  r'(?m)^version = "[^"]+"$',
                  f'version = "{version}"',
              ),
              "package.nix": (
                  r'(?m)^  version = "[^"]+";$',
                  f'  version = "{version}";',
              ),
          }

          for path_str, (pattern, replacement) in updates.items():
              path = pathlib.Path(path_str)
              original = path.read_text()
              updated, count = re.subn(pattern, replacement, original, count=1)
              if count != 1:
                  print(f"Failed to update version in {path}", file=sys.stderr)
                  sys.exit(1)
              path.write_text(updated)
          PY

      - name: Commit and push version bump
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if git diff --quiet -- pyproject.toml package.nix; then
            echo "No version changes were made" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml package.nix
          git commit -m "chore(release): v${RELEASE_VERSION}"
          git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"
          git push origin HEAD
          git push origin "v${RELEASE_VERSION}"

  build-wheels:
    name: Build release wheels (${{ matrix.name }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64
          - name: macos-arm64
            os: macos-14
            target: aarch64

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          command: build
          args: --release --out dist --interpreter 3.12
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Smoke test built wheel
        shell: bash
        run: |
          # Use uv to create a clean environment and install the local wheel
          # --no-cache ensures we aren't testing an old version
          uv venv smoke_env
          source smoke_env/bin/activate
          uv pip install dist/*.whl --no-cache
          # import the local folder instead of the installed wheel
          mkdir -p test_dir
          cd test_dir
          python - <<'PY'
          import importlib
          import sys
          # 1. Try to import the native module directly (from pyproject.toml name)
          try:
              native_mod = importlib.import_module("lx_anonymizer._lx_anonymizer_native")
              print("✅ Successfully imported _lx_anonymizer_native")
          except ImportError as e:
              print(f"❌ Failed to import native module: {e}")
              sys.exit(1)

          # 2. Try to import high-level package
          try:
              import lx_anonymizer
              print(f"✅ Package version: {lx_anonymizer.__version__}")
          except Exception as e:
              print(f"❌ Package initialization failed: {e}")
              sys.exit(1)
          PY

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build release sdist
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Build sdist
        run: |
          uv build --sdist
          uvx twine check dist/*
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/lx_anonymizer-*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
