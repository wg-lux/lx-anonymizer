name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    name: Lint and lightweight tests

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev --extra django --extra ocr

      - name: Lint with flake8
        run: uv run flake8

      - name: Run lightweight tests
        env:
          PYTHONPATH: "${{ github.workspace }}/lx_anonymizer"
        run: uv run pytest tests/test_imports.py -q --maxfail=1 --disable-warnings

  build-wheels:
    name: Build wheels (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64
          - name: macos-arm64
            os: macos-latest
            target: aarch64

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          command: build
          args: --release --out dist --interpreter 3.12

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-deps dist/*.whl
          python - <<'PY'
          import importlib
          import lx_anonymizer

          native_wrapper = importlib.import_module("lx_anonymizer._native")
          native_mod = importlib.import_module("lx_anonymizer._lx_anonymizer_native")

          assert lx_anonymizer is not None
          assert native_wrapper.native is not None
          assert native_mod is not None
          PY

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Build sdist
        run: |
          uv build --sdist
          uvx pkginfo --metadata dist/*.tar.gz

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
