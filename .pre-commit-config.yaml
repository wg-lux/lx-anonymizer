repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: ["--fix", "lx_anonymizer", "tests"]
        pass_filenames: false
      - id: ruff-format
        args: ["lx_anonymizer", "tests"]
        pass_filenames: false
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: mypy lx_anonymizer
        language: system
        pass_filenames: false
      - id: repo-state-and-tests
        name: repository state and tests
        entry: scripts/pre_commit_checks.sh
        language: system
        pass_filenames: false
